version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    versioning-strategy: increase
    groups:
      types:
        patterns: ["@types/*"]
      drizzle:
        patterns: ["drizzle*"]
      trpc:
        patterns: ["@trpc/*"]
      aws-sdk:
        patterns: ["@aws-sdk/*"]
    labels: ["dependencies"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels: ["dependencies", "ci"]

  - package-ecosystem: docker
    directory: "/docker"
    schedule:
      interval: monthly
    labels: ["dependencies", "docker"]
